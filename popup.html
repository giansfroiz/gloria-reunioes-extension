<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Gloria Reuniões</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      width: 320px;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #222;
    }
    .logo { font-size: 22px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header small { font-size: 10px; color: #666; }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background .3s;
    }
    .dot.on { background: #ef4444; animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.35} }

    label { font-size: 11px; color: #777; display: block; margin-bottom: 4px; }
    input, select {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 7px;
      color: #f0f0f0;
      padding: 8px 10px;
      font-size: 13px;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus, select:focus { border-color: #22c55e; }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      letter-spacing: .3px;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .38; cursor: default; }
    .btn-start { background: #22c55e; color: #000; }
    .btn-stop  { background: #ef4444; color: #fff; margin-top: 8px; }

    .status-bar {
      margin-top: 12px;
      font-size: 11px;
      color: #888;
      min-height: 16px;
    }
    .status-bar.err { color: #f87171; }
    .status-bar.ok  { color: #4ade80; }

    .divider { border: none; border-top: 1px solid #1e1e1e; margin: 14px 0 10px; }

    .footer {
      display: flex;
      gap: 8px;
    }
    .footer a {
      flex: 1;
      font-size: 10px;
      color: #555;
      text-decoration: none;
      text-align: center;
      padding: 5px;
      border: 1px solid #222;
      border-radius: 5px;
      transition: color .2s, border-color .2s;
    }
    .footer a:hover { color: #22c55e; border-color: #22c55e; }

    .meeting-badge {
      display: none;
      background: #0f2a1a;
      border: 1px solid #1a4a2a;
      border-radius: 7px;
      padding: 8px 10px;
      margin-bottom: 10px;
      font-size: 11px;
      color: #4ade80;
    }
    .meeting-badge span { color: #888; font-size: 10px; display: block; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">&#127908;</span>
    <div>
      <h1>Gloria Reuniões</h1>
      <small>Transcrição com IA</small>
    </div>
    <div class="dot" id="dot" style="margin-left:auto"></div>
  </div>

  <div class="meeting-badge" id="activeBadge">
    <strong id="activeTitle">Reunião em andamento</strong>
    <span id="activeMeetingId"></span>
  </div>

  <label for="titleInput">Título da reunião</label>
  <input id="titleInput" type="text" placeholder="Ex: Planejamento semanal" />

  <label for="platformSelect">Plataforma</label>
  <select id="platformSelect">
    <option value="google_meet">Google Meet</option>
    <option value="zoom">Zoom</option>
    <option value="teams">Microsoft Teams</option>
    <option value="other">Outra</option>
  </select>

  <button class="btn btn-start" id="startBtn">▶&#xfe0f; Iniciar Transcrição</button>
  <button class="btn btn-stop"  id="stopBtn"  disabled>⏹ Parar e Salvar</button>

  <div class="status-bar" id="status">Pronto para transcrever.</div>

  <hr class="divider" />
  <div class="footer">
    <a id="supabaseLink" href="https://supabase.com/dashboard/project/vwxuqljtqqmevgiwecsf/editor" target="_blank">&#128197; Ver Reuniões</a>
    <a id="transcriptLink" href="https://supabase.com/dashboard/project/vwxuqljtqqmevgiwecsf/editor" target="_blank">&#128221; Transcrições</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
